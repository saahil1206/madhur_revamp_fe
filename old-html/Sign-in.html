<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/signin.css" />
    <title>Madhur - Sign In</title>
  </head>
  <body>
    <div class=" subpage-bg-gradient">
      <!-- Logo -->
      <div class="text-center pt-5 pb-4">
        <a href="index.html">
          <img src="./img/Logo.png" alt="Madhur Logo" class="signin-logo" />
        </a>
      </div>

      <!-- Tab Buttons -->
      <div class="d-flex justify-content-center mb-4">
        <div class="tab-container">
          <button class="tab-btn" id="signinTab">Sign In</button>
          <button class="tab-btn active" id="signupTab">Sign Up</button>
        </div>
      </div>

      <!-- Form Card -->
      <div class="d-flex justify-content-center pb-5">
        <div class="form-card">
          <!-- Sign In Form -->
          <form id="signinForm" class="d-none">
            <div class="mb-3">
              <input
                type="email"
                class="form-control signin-input"
                placeholder="Email"
              />
            </div>
            <div class="mb-3 position-relative">
              <input
                type="password"
                class="form-control signin-input"
                placeholder="Password"
              />
              <i class="fas fa-eye-slash toggle-password"></i>
            </div>
            <button type="submit" class="btn signin-btn w-100 mt-2">
              Sign In
            </button>
          </form>

          <!-- Sign Up Form -->
          <form id="signupForm">
            <div class="mb-3">
              <input
                type="email"
                class="form-control signin-input"
                placeholder="Email"
              />
            </div>
            <div class="mb-3 position-relative">
              <input
                type="password"
                class="form-control signin-input"
                placeholder="Password"
              />
              <i class="fas fa-eye-slash toggle-password"></i>
            </div>
            <div class="mb-3">
              <input
                type="text"
                class="form-control signin-input"
                placeholder="First Name"
                pattern="[A-Za-z\s]{2,}"
                title="Only letters allowed, minimum 2 characters"
                oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')"
              />
            </div>
            <div class="mb-3">
              <input
                type="text"
                class="form-control signin-input"
                placeholder="Last Name"
                pattern="[A-Za-z\s]{2,}"
                title="Only letters allowed, minimum 2 characters"
                oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')"
              />
            </div>
            <div class="mb-3">
              <input
                type="tel"
                class="form-control signin-input"
                placeholder="Mobile Number"
                maxlength="10"
                pattern="[0-9]{10}"
                inputmode="numeric"
                title="Please enter a valid 10-digit mobile number"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
              />
            </div>
            <div class="form-check mb-3">
              <input
                class="form-check-input"
                type="checkbox"
                id="ageCheck"
                checked
              />
              <label class="form-check-label text-white" for="ageCheck">
                I am eligible to play as I am 18 and above
              </label>
            </div>
            <button type="submit" class="btn signin-btn w-100">
              Create Account
            </button>
          </form>

          <!-- Footer Text -->
          <p class="footer-text text-center mt-3">
            justo eros, maximus a
            <a href="#" class="terms-link">Terms & Conditions</a> faucibus
            sapien. Vestibulum quis sodales elit. Sed ornare eleifend vehicula.
            In hac
            <a href="#" class="privacy-link">Privacy Policy</a>
          </p>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <style>
      .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #999;
        font-size: 16px;
      }
      .toggle-password:hover {
        color: #561d5e;
      }
    </style>
    <script>
      const signinTab = document.getElementById("signinTab");
      const signupTab = document.getElementById("signupTab");
      const signinForm = document.getElementById("signinForm");
      const signupForm = document.getElementById("signupForm");

      signinTab.addEventListener("click", function () {
        signinTab.classList.add("active");
        signupTab.classList.remove("active");
        signinForm.classList.remove("d-none");
        signupForm.classList.add("d-none");
      });

      signupTab.addEventListener("click", function () {
        signupTab.classList.add("active");
        signinTab.classList.remove("active");
        signupForm.classList.remove("d-none");
        signinForm.classList.add("d-none");
      });
      document.querySelectorAll(".toggle-password").forEach(function (icon) {
        icon.addEventListener("click", function () {
          var input = this.previousElementSibling;
          if (input.type === "password") {
            input.type = "text";
            this.classList.remove("fa-eye-slash");
            this.classList.add("fa-eye");
          } else {
            input.type = "password";
            this.classList.remove("fa-eye");
            this.classList.add("fa-eye-slash");
          }
        });
      });
    </script>
  </body>
</html>
